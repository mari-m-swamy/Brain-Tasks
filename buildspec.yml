version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: brain-tasks-app
    AWS_DEFAULT_REGION: us-east-1

phases:
  install:
    commands:
      - echo Installing kubectl
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - chmod +x kubectl

  pre_build:
    commands:
      - echo "AWS Identity"
      - aws sts get-caller-identity
      - echo "Login to ECR"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 558316745366.dkr.ecr.us-east-1.amazonaws.com
      - echo "Build Docker image"
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest 558316745366.dkr.ecr.us-east-1.amazonaws.com/brain-tasks-app:latest

  build:
    commands:
      - echo "Push image"
      - docker push 558316745366.dkr.ecr.us-east-1.amazonaws.com/brain-tasks-app:latest

  post_build:
    commands:
      - echo "Configure kubeconfig"
      - aws eks update-kubeconfig --region us-east-1 --name brain-tasks-cluster

      - echo "Test cluster access"
      - kubectl get nodes

      - echo "Deploy app"
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
